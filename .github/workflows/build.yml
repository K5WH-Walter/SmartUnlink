name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish as GitHub Release?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npx electron-builder --win --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist folder
        run: dir dist

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartUnlink-Windows
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npx electron-builder --mac --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist folder
        run: ls -la dist/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartUnlink-macOS
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npx electron-builder --linux --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist folder
        run: ls -la dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartUnlink-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: always() && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success' || needs.build-linux.result == 'success') && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true')

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: SmartUnlink-Windows
          path: release-assets
        continue-on-error: true

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: SmartUnlink-macOS
          path: release-assets
        continue-on-error: true

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: SmartUnlink-Linux
          path: release-assets
        continue-on-error: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmartUnlink ${{ github.ref_name }} — K5WH Edition
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          body: |
            ## SmartUnlink ${{ github.ref_name }} — K5WH Edition

            Enhanced fork by **Walter Holmes — K5WH** • Houston, TX
            Live 24/7 support: http://www.k5wh.net/zoom
            Original author: Brian EI6LF — https://github.com/brianbruff/SmartUnlink

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `SmartUnlink Setup *.exe` | Installer (recommended) |
            | Windows | `SmartUnlink *.exe` | Portable — no install needed |
            | macOS Intel | `SmartUnlink-*-x64.dmg` | Intel Mac |
            | macOS Apple Silicon | `SmartUnlink-*-arm64.dmg` | M1/M2/M3 Mac |
            | Linux | `SmartUnlink-*.AppImage` | Universal — chmod +x then run |
            | Linux | `SmartUnlink-*.deb` | Debian / Ubuntu |
            | Linux | `SmartUnlink-*.rpm` | Fedora / RHEL |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
